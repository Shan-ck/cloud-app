name: Cloud App CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    name: "Stage 1 — Build & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP files
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -n1 php -l

  test:
    name: "Stage 2 — Unit & Integration Tests"
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cloud_app_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - run: composer install
      - name: Create reports directory
        run: mkdir -p reports
      - name: Run tests
        run: vendor/bin/phpunit --configuration phpunit.xml --log-junit reports/results.xml

  security:
    name: "Stage 3 — OWASP Security Scan"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "cloud-app"
          path: "."
          format: "HTML"
          args: --failOnCVSS 7

  deploy:
    name: "Stage 4 — Deploy to Vercel"
    runs-on: ubuntu-latest
    needs: security
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
